<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>CampusHub</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="../static/css/style.css">

</head>

<body>

    <!-- Navbar -->
    <nav class="navbar navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">
                CampusHub
            </a>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container mt-5">

        <h1 class="text-center mb-3">
            Student Resource Portal
        </h1>

        <p class="text-center text-muted mb-5">
            Manage Students, Faculty and Study Resources
        </p>

        <div class="row g-4">

            <!-- Students -->
            <div class="col-md-3">
                <div class="card shadow-sm">
                    <div class="card-body text-center">

                        <h5 class="card-title">
                            Students
                        </h5>

                        <p class="card-text">
                            View all students.
                        </p>

                        <a href="/students" class="btn btn-primary w-100">
                            Open
                        </a>

                    </div>
                </div>
            </div>

            <!-- Faculty -->
            <div class="col-md-3">
                <div class="card shadow-sm">
                    <div class="card-body text-center">

                        <h5 class="card-title">
                            Faculty
                        </h5>

                        <p class="card-text">
                            View faculty members.
                        </p>

                        <a href="/faculty" class="btn btn-success w-100">
                            Open
                        </a>

                    </div>
                </div>
            </div>

            <!-- Resources -->
            <div class="col-md-3">
                <div class="card shadow-sm">
                    <div class="card-body text-center">

                        <h5 class="card-title">
                            Resources
                        </h5>

                        <p class="card-text">
                            View study resources.
                        </p>

                        <a href="/resources" class="btn btn-warning w-100">
                            Open
                        </a>

                    </div>
                </div>
            </div>

            <!-- Upload -->
            <div class="col-md-3">
                <div class="card shadow-sm">
                    <div class="card-body text-center">

                        <h5 class="card-title">
                            Upload
                        </h5>

                        <p class="card-text">
                            Upload new resources.
                        </p>

                        <a href="/upload" class="btn btn-danger w-100">
                            Open
                        </a>

                    </div>
                </div>
            </div>

        </div>

    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Custom JS -->
    <script src="../static/js/script.js"></script>

</body>

</html>
